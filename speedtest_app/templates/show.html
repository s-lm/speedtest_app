<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Speedtest App</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='img/favicon.ico') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='img/apple-touch-icon.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/speedtest.css') }}">
    <!-- Prevent theme flash -->
    <script>
        (function () {
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const savedTheme = localStorage.getItem('theme');
            const theme = savedTheme || (prefersDark ? 'dark' : 'light');
            if (theme === 'dark') document.documentElement.classList.add('dark');
        })();
    </script>
    <script src="{{ url_for('static', filename='js/theme-toggle.js') }}"></script>
    <script src="{{ url_for('static', filename='js/chart.umd.js') }}"></script>
    <script src="{{ url_for('static', filename='js/chartjs-adapter-date-fns.bundle.min.js') }}"></script>
</head>

<body>
    {% from "_toolbar.html" import toolbar %}
    {{ toolbar(session.token.userinfo if session.get('token') else None, ENABLE_OIDC) }}

    <div id="status-bar" class="status-bar">
        <span id="freshness" class="badge badge-muted">Loading…</span>
        <div class="status-actions">
            <button id="runNow" type="button" class="action-btn">Run test now</button>
            <a id="exportLink" class="action-btn" href="/api/export?format=csv" download>Export CSV</a>
        </div>
    </div>

    <div class="year-month-selector">
        <label for="rangeSelect">View:</label>
        <select id="rangeSelect">
            <option value="month">By month</option>
            <option value="7">Last 7 days</option>
            <option value="30">Last 30 days</option>
            <option value="90">Last 90 days</option>
        </select>
        <span id="month-fields">
            <label for="yearSelect">Year:</label>
            <select id="yearSelect"></select>
            <label for="monthSelect">Month:</label>
            <select id="monthSelect"></select>
        </span>
    </div>

    <div id="stat-cards" class="stat-cards"></div>

    <div class="chart-container">
        <canvas id="speedChart"></canvas>
        <div id="chart-status" class="chart-status" hidden></div>
    </div>

    <script>
        const PLAN_DOWNLOAD = {{ PLAN_DOWNLOAD }};
        const PLAN_UPLOAD = {{ PLAN_UPLOAD }};

        let allPoints = [];

        // Chart status overlay helpers (loading / empty / error states)
        const chartStatus = document.getElementById('chart-status');
        function showStatus(msg) {
            chartStatus.textContent = msg;
            chartStatus.hidden = false;
        }
        function hideStatus() {
            chartStatus.hidden = true;
        }

        // ---- summary statistics ----
        function quantile(sorted, p) {
            if (!sorted.length) return NaN;
            const idx = (sorted.length - 1) * p;
            const lo = Math.floor(idx), hi = Math.ceil(idx);
            return sorted[lo] + (sorted[hi] - sorted[lo]) * (idx - lo);
        }
        function computeStats(values) {
            if (!values.length) return null;
            const sorted = [...values].sort((a, b) => a - b);
            const sum = values.reduce((a, b) => a + b, 0);
            return {
                min: sorted[0],
                max: sorted[sorted.length - 1],
                avg: sum / values.length,
                median: quantile(sorted, 0.5),
                p5: quantile(sorted, 0.05),
                p95: quantile(sorted, 0.95),
            };
        }

        // ---- summary cards (points are newest-first) ----
        function renderCards(points) {
            const container = document.getElementById('stat-cards');
            if (!points.length) { container.innerHTML = ''; return; }
            const latest = points[0];
            const dl = points.map(p => p.download / 1_000_000);
            const ul = points.map(p => p.upload / 1_000_000);
            const pg = points.map(p => p.ping);
            container.innerHTML = [
                card('Download', latest.download / 1_000_000, computeStats(dl), 'Mbit/s', PLAN_DOWNLOAD),
                card('Upload', latest.upload / 1_000_000, computeStats(ul), 'Mbit/s', PLAN_UPLOAD),
                card('Ping', latest.ping, computeStats(pg), 'ms', 0),
            ].join('');
        }

        function card(title, latest, s, unit, plan) {
            const fmt = v => Number.isFinite(v) ? v.toFixed(unit === 'ms' ? 0 : 1) : '–';
            let planRow = '';
            if (plan > 0) {
                const pct = (s.median / plan) * 100;
                const cls = pct >= 80 ? 'plan-good' : (pct >= 50 ? 'plan-ok' : 'plan-bad');
                planRow = `<div class="card-plan ${cls}">${pct.toFixed(0)}% of ${plan} ${unit} plan</div>`;
            }
            return `
            <div class="stat-card">
                <div class="card-title">${title}</div>
                <div class="card-latest">${fmt(latest)}<span class="card-unit"> ${unit}</span></div>
                ${planRow}
                <div class="card-grid">
                    <span>median</span><span>${fmt(s.median)}</span>
                    <span>min</span><span>${fmt(s.min)}</span>
                    <span>max</span><span>${fmt(s.max)}</span>
                    <span>p5–p95</span><span>${fmt(s.p5)}–${fmt(s.p95)}</span>
                </div>
            </div>`;
        }

        // Chart initialization (ONCE, at startup)
        const ctx = document.getElementById('speedChart').getContext('2d');
        const isDark = document.documentElement.classList.contains('dark');
        const datasets = [
            { label: 'Download Speed (Mbit/s)', data: [], borderColor: 'blue', fill: false, yAxisID: 'A' },
            { label: 'Upload Speed (Mbit/s)', data: [], borderColor: 'red', fill: false, yAxisID: 'A' },
            { label: 'Ping (ms)', data: [], borderColor: 'green', fill: false, yAxisID: 'B' },
        ];
        if (PLAN_DOWNLOAD > 0) datasets.push({ label: 'Plan download', data: [], borderColor: 'rgba(0,0,255,0.45)', borderDash: [6, 4], pointRadius: 0, fill: false, yAxisID: 'A' });
        if (PLAN_UPLOAD > 0) datasets.push({ label: 'Plan upload', data: [], borderColor: 'rgba(255,0,0,0.45)', borderDash: [6, 4], pointRadius: 0, fill: false, yAxisID: 'A' });

        // Draws a small triangle on the x-axis wherever the test server changed,
        // so the data lines stay clean and the values are easy to compare.
        const serverChangeMarkers = {
            id: 'serverChangeMarkers',
            afterDatasetsDraw(chart) {
                const changes = chart.$serverChanges;
                if (!changes || !changes.length) return;
                const { ctx, chartArea, scales } = chart;
                const dark = document.documentElement.classList.contains('dark');
                ctx.save();
                ctx.fillStyle = dark ? '#e0a030' : '#c97a00';
                changes.forEach(ts => {
                    const px = scales.x.getPixelForValue(new Date(ts).getTime());
                    if (px < chartArea.left || px > chartArea.right) return;
                    const y = chartArea.bottom;
                    ctx.beginPath();
                    ctx.moveTo(px, y - 8);   // apex pointing up
                    ctx.lineTo(px - 5, y);
                    ctx.lineTo(px + 5, y);
                    ctx.closePath();
                    ctx.fill();
                });
                ctx.restore();
            }
        };

        window.speedChart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets },
            options: createChartOptions(isDark),
            plugins: [serverChangeMarkers]
        });

        function setPlanLine(label, value, x0, x1) {
            if (!(value > 0)) return;
            const ds = window.speedChart.data.datasets.find(d => d.label === label);
            if (ds) ds.data = [{ x: x0, y: value }, { x: x1, y: value }];
        }

        function updateChart(points) {
            if (!window.speedChart) {
                console.error("Chart not initialized yet.");
                return;
            }

            const downloadData = points.map(p => ({ x: p.timestamp, y: p.download / 1_000_000, meta: p }));
            const uploadData = points.map(p => ({ x: p.timestamp, y: p.upload / 1_000_000, meta: p }));
            const pingData = points.map(p => ({ x: p.timestamp, y: p.ping, meta: p }));

            const dl = window.speedChart.data.datasets[0];
            dl.data = downloadData;
            // Record where the test server changed; the markers are drawn on the
            // x-axis by the serverChangeMarkers plugin rather than recolouring the line.
            window.speedChart.$serverChanges = points
                .filter(p => p.serverChanged)
                .map(p => p.timestamp);

            window.speedChart.data.datasets[1].data = uploadData;
            window.speedChart.data.datasets[2].data = pingData;

            if (points.length) {
                const newest = points[0].timestamp;
                const oldest = points[points.length - 1].timestamp;
                setPlanLine('Plan download', PLAN_DOWNLOAD, oldest, newest);
                setPlanLine('Plan upload', PLAN_UPLOAD, oldest, newest);
            }

            window.speedChart.update();
        }

        function createChartOptions(dark) {
            return {
                responsive: true,
                maintainAspectRatio: true,
                aspectRatio: 2,
                interaction: {
                    mode: 'nearest',
                    intersect: true
                },
                scales: {
                    x: {
                        type: 'time',
                        time: {},
                        ticks: {
                            color: dark ? '#ccc' : '#111'
                        },
                        grid: {
                            color: dark ? '#444' : '#ccc'
                        }
                    },
                    A: {
                        type: 'linear',
                        position: 'left',
                        beginAtZero: true,
                        title: {
                            display: true,
                            text: 'Speed (Mbit/s)',
                            color: dark ? '#ccc' : '#111'
                        },
                        ticks: { color: dark ? '#ccc' : '#111' },
                        grid: {
                            color: dark ? '#444' : '#ccc'
                        }
                    },
                    B: {
                        type: 'linear',
                        position: 'right',
                        beginAtZero: true,
                        title: {
                            display: true,
                            text: 'Ping (ms)',
                            color: dark ? '#ccc' : '#111'
                        },
                        ticks: { color: dark ? '#ccc' : '#111' },
                        grid: {
                            drawOnChartArea: false
                        }
                    }
                },
                plugins: {
                    legend: {
                        labels: {
                            color: dark ? '#ccc' : '#111'
                        }
                    },
                    tooltip: {
                        callbacks: {
                            label: function (context) {
                                const p = context.raw.meta;
                                if (!p) return '';
                                if (context.dataset.label === 'Ping (ms)') {
                                    return [
                                        `Ping: ${p.ping} ms`,
                                        `Sponsor: ${p.sponsor}`,
                                        `Server: ${p.server}`,
                                        `Distance: ${p.distance} km`,
                                        `IP: ${p.ip}`,
                                        `ISP: ${p.isp}`
                                    ];
                                } else if (context.dataset.label === 'Download Speed (Mbit/s)') {
                                    return [
                                        `Download: ${(p.download / 1_000_000).toFixed(2)} Mbit/s`,
                                        `Sponsor: ${p.sponsor}`,
                                        `Server: ${p.server}`,
                                        `Distance: ${p.distance} km`,
                                        `IP: ${p.ip}`,
                                        `ISP: ${p.isp}`
                                    ];
                                } else if (context.dataset.label === 'Upload Speed (Mbit/s)') {
                                    return [
                                        `Upload: ${(p.upload / 1_000_000).toFixed(2)} Mbit/s`,
                                        `Sponsor: ${p.sponsor}`,
                                        `Server: ${p.server}`,
                                        `Distance: ${p.distance} km`,
                                        `IP: ${p.ip}`,
                                        `ISP: ${p.isp}`
                                    ];
                                }
                                return '';
                            },
                            afterLabel: function (context) {
                                const p = context.raw.meta;
                                return (p && p.serverChanged) ? '⚠ server changed' : '';
                            }
                        }
                    }
                }
            };
        }

        function applyChartTheme(dark) {
            const chart = window.speedChart;
            chart.options = createChartOptions(dark);
            chart.update();
        }

        // Fetch years and months and populate selectors
        showStatus('Loading…');
        fetch('/api/years_months')
            .then(response => {
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return response.json();
            })
            .then(data => {
                const yearSelect = document.getElementById('yearSelect');
                const monthSelect = document.getElementById('monthSelect');
                yearSelect.innerHTML = '';
                monthSelect.innerHTML = '';
                const years = Object.keys(data).sort((a, b) => b - a);
                years.forEach(year => {
                    const option = document.createElement('option');
                    option.value = year;
                    option.textContent = year;
                    yearSelect.appendChild(option);
                });
                function updateMonths() {
                    const selectedYear = yearSelect.value;
                    const months = (data[selectedYear] || []).sort((a, b) => b - a);
                    monthSelect.innerHTML = '';
                    months.forEach(month => {
                        const option = document.createElement('option');
                        option.value = month;
                        option.textContent = new Date(2000, month - 1)
                            .toLocaleString('default', { month: 'long' });
                        monthSelect.appendChild(option);
                    });
                }
                yearSelect.onchange = () => {
                    updateMonths();
                    refresh();
                };
                monthSelect.onchange = () => {
                    refresh();
                };
                if (years.length > 0) {
                    yearSelect.value = years[0];
                    updateMonths();
                    refresh();
                } else {
                    showStatus('No data available yet');
                }
            })
            .catch(err => {
                console.error('Failed to load filters:', err);
                showStatus('Failed to load data');
            });

        // Build the /api query string from the current view selection.
        function buildParams() {
            const mode = document.getElementById('rangeSelect').value;
            if (mode === 'month') {
                const y = document.getElementById('yearSelect').value;
                const m = document.getElementById('monthSelect').value;
                return `year=${y}&month=${m}`;
            }
            return `days=${mode}`;
        }

        function refresh() {
            const params = buildParams();
            showStatus('Loading…');
            document.getElementById('exportLink').href =
                `/api/export?${params}&format=csv`;
            fetch(`/api/data?${params}`)
                .then(response => {
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    return response.json();
                })
                .then(result => {
                    allPoints = result.data.map(row => ({
                        timestamp: row.timestamp,
                        ping: parseFloat(row.ping),
                        download: parseFloat(row.download),
                        upload: parseFloat(row.upload),
                        sponsor: row.sponsor,
                        server: row.server,
                        distance: row.distance,
                        ip: row.ip,
                        isp: row.isp
                    }));
                    // Flag points where the server changed vs the previous (older) test
                    allPoints.forEach((p, i) => {
                        const older = allPoints[i + 1];
                        p.serverChanged = older ? p.server !== older.server : false;
                    });
                    updateChart(allPoints);
                    renderCards(allPoints);
                    if (allPoints.length === 0) {
                        showStatus('No data for this period');
                    } else {
                        hideStatus();
                    }
                })
                .catch(err => {
                    console.error('Failed to load data:', err);
                    showStatus('Failed to load data');
                });
        }

        // ---- freshness / reliability badge ----
        function relTime(iso) {
            const mins = Math.round((Date.now() - new Date(iso)) / 60000);
            if (mins < 60) return `${mins} min ago`;
            const hrs = Math.round(mins / 60);
            if (hrs < 48) return `${hrs}h ago`;
            return `${Math.round(hrs / 24)}d ago`;
        }
        function loadStatus() {
            const badge = document.getElementById('freshness');
            fetch('/api/status')
                .then(r => r.ok ? r.json() : Promise.reject(r.status))
                .then(s => {
                    if (!s.last_test) {
                        badge.textContent = 'No tests yet';
                        badge.className = 'badge badge-muted';
                        return;
                    }
                    // Tests run every 8h; older than ~9h likely means the scheduler stalled
                    const ageHours = (Date.now() - new Date(s.last_test)) / 3600000;
                    badge.className = 'badge ' + (ageHours > 9 ? 'badge-bad' : 'badge-good');
                    let txt = `Last test ${relTime(s.last_test)}`;
                    if (s.total_failures) txt += ` · ${s.total_failures} failure${s.total_failures > 1 ? 's' : ''}`;
                    badge.textContent = txt;
                })
                .catch(() => {
                    badge.textContent = 'Status unavailable';
                    badge.className = 'badge badge-muted';
                });
        }

        // ---- view selector (month vs rolling window) ----
        document.getElementById('rangeSelect').addEventListener('change', (e) => {
            document.getElementById('month-fields').style.display =
                e.target.value === 'month' ? '' : 'none';
            refresh();
        });

        // ---- manual "run test now" ----
        document.getElementById('runNow').addEventListener('click', () => {
            const btn = document.getElementById('runNow');
            const original = btn.textContent;
            btn.disabled = true;
            btn.textContent = 'Running…';
            fetch('/api/run', { method: 'POST' })
                .then(r => r.json().then(j => ({ ok: r.ok, j })))
                .then(({ ok, j }) => {
                    if (!ok) throw new Error(j.status || 'failed');
                    loadStatus();
                    refresh();
                })
                .catch(err => {
                    console.error('Run failed:', err);
                    alert('Test failed or another run is already in progress.');
                })
                .finally(() => {
                    btn.disabled = false;
                    btn.textContent = original;
                });
        });

        loadStatus();
    </script>
</body>

</html>
